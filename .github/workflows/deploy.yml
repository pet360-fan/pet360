name: Deploy Next.js frontend to GitHub Pages

on:
  push:
    branches: ["dev"]  # or "master" - whichever has your code
    paths: ["web/**"]  # Trigger when web folder changes
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Install dependencies
        working-directory: ./web
        run: npm ci  # or yarn install / pnpm install
      
      - name: Build Next.js static export
        working-directory: ./web
        run: npm run build  # Make sure your package.json has "build" script
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/out  # Static files from Next.js export

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4