name: Deploy Next.js frontend to GitHub Pages

on:
  push:
    branches: ["main"]
    paths: ["web/**"]  # Only trigger when web folder changes
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Install dependencies (frontend only)
        working-directory: ./web   # Navigate into web folder
        run: npm ci
      
      - name: Build Next.js static export
        working-directory: ./web   # Build inside web folder
        run: npx next build
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/out   # The static files are in web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4